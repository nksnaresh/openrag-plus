version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ragct_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pwd_123}
      POSTGRES_DB: ${POSTGRES_DB:-rag_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
