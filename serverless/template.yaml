AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RAG+ Platform Serverless Tier

Resources:
  DocumentStorageBucket:
    Type: AWS::S3::Bucket
    DependsOn: IngestionQueuePolicy
    Properties:
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
            Queue: !GetAtt IngestionQueue.Arn

  IngestionQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IngestionQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IngestionQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Sub ${AWS::AccountId}

  IngestionWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ingestion/
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 300
      MemorySize: 2048
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentStorageBucket
      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt IngestionQueue.Arn
            BatchSize: 1

  ReasoningEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: reasoning/
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 2048

  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: rag-document-ingestion-queue
      VisibilityTimeout: 300

Outputs:
  DocumentBucketName:
    Description: Generated S3 Bucket Name for document uploads
    Value: !Ref DocumentStorageBucket
